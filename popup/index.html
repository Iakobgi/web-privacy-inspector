<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Privacy Inspector</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="popup-shell">
    <header class="popup-header">
      <div class="brand">
        <div class="shield-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M12 3l7 3v5c0 4.7-2.9 8.8-7 10-4.1-1.2-7-5.3-7-10V6l7-3z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
            <path d="M8.5 12l2.2 2.2L15.8 9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div>
          <h1>Privacy Inspector</h1>
          <p>Analyze. Protect. Browse smarter.</p>
        </div>
      </div>
      <button id="refreshButton" class="icon-button" title="Refresh data" aria-label="Refresh data">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M20 11a8 8 0 1 0-2.34 5.66" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M20 4v7h-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </header>

    <section class="site-card">
      <div class="site-row">
        <span>Site</span>
        <strong id="siteDomain">Loading...</strong>
      </div>
      <div class="site-row">
        <span>Total requests</span>
        <strong id="totalRequests">0</strong>
      </div>
      <div class="site-row">
        <span>Third-party requests</span>
        <strong id="thirdPartyRequests">0</strong>
      </div>
      <div class="site-row">
        <span>Cookies</span>
        <strong id="cookieCount">0</strong>
      </div>
    </section>

    <section class="details-list">
      <button class="detail-item" id="trackersToggle" type="button">
        <span class="detail-icon eye-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M2 12s3.6-6 10-6 10 6 10 6-3.6 6-10 6S2 12 2 12z" stroke="currentColor" stroke-width="2"/>
            <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
          </svg>
        </span>
        <span>
          <strong>Third-party Trackers</strong>
          <small id="trackerSummary">No trackers detected</small>
        </span>
        <span class="chevron">›</span>
      </button>

      <div class="detail-panel" id="trackersPanel">
        <ul id="trackerList"></ul>
      </div>

      <button class="detail-item" id="cookiesToggle" type="button">
        <span class="detail-icon cookie-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M20 13.5A8 8 0 1 1 10.5 4a3.5 3.5 0 0 0 4 4 3 3 0 0 0 3.5 3.5 3.7 3.7 0 0 0 2 .3 7 7 0 0 1 0 1.7z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
            <circle cx="9" cy="13" r="1" fill="currentColor"/>
            <circle cx="12" cy="16" r="1" fill="currentColor"/>
            <circle cx="14" cy="12" r="1" fill="currentColor"/>
          </svg>
        </span>
        <span>
          <strong>Cookies</strong>
          <small id="cookiesSummary">No cookies found</small>
        </span>
        <span class="chevron">›</span>
      </button>

      <div class="detail-panel" id="cookiesPanel">
        <ul id="cookiesList"></ul>
      </div>
    </section>

    <footer class="popup-footer">
      <button id="viewDetailsButton" class="primary-button" type="button">
        <span class="shield-small" aria-hidden="true">🛡️</span>
        View Details
      </button>
    </footer>
  </main>

  <script src="popup.js"></script>
</body>
</html>
